<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Moj Clone</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        .app-container { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .app-container::-webkit-scrollbar { display: none; }
        
        .video-card { position: relative; width: 100%; height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; color: white; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .ui-overlay { position: absolute; bottom: 30px; left: 10px; z-index: 10; }
        .side-bar { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; text-align: center; }
        .icon { font-size: 25px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="video-card">
        <video src="https://www.w3schools.com/html/mov_bbb.mp4" loop onclick="this.paused ? this.play() : this.pause()"></video>
        <div class="ui-overlay">
            <h3>@User_One</h3>
            <p>यह मेरा पहला वीडियो है! #MojClone</p>
        </div>
        <div class="side-bar">
            <div class="icon">❤️<br><small>12k</small></div>
            <div class="icon">💬<br><small>300</small></div>
            <div class="icon">🔗</div>
        </div>
    </div>

    <div class="video-card">
        <video src="https://www.w3schools.com/html/movie.mp4" loop onclick="this.paused ? this.play() : this.pause()"></video>
        <div class="ui-overlay">
            <h3>@Creative_Mind</h3>
            <p>मजेदार वीडियो देखिए! 🚀</p>
        </div>
        <div class="side-bar">
            <div class="icon">❤️<br><small>5k</small></div>
            <div class="icon">💬<br><small>150</small></div>
            <div class="icon">🔗</div>
        </div>
    </div>
</div>

<script>
    // वीडियो पर क्लिक करने पर प्ले/पॉज करने के लिए
    document.querySelectorAll('video').forEach(v => {
        v.addEventListener('click', () => {
            if (v.paused) v.play(); else v.pause();
        });
    });
</script>

</body>
</html>
