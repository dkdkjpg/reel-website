<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DKD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:system-ui;height:100vh;overflow:hidden}
.header{position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,.95);padding:15px 20px;z-index:100;display:flex;align-items:center;justify-content:center}
.logo{font-size:26px;font-weight:900;background:linear-gradient(45deg,#ff1744,#ff5722);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.feed{height:100vh;overflow-y:auto;padding-top:70px;padding-bottom:110px;max-width:390px;margin:0 auto;scroll-snap-type:y mandatory}
.video-card{height:100vh;scroll-snap-align:start;position:relative;background:#000;display:flex;align-items:center;justify-content:center}
video{width:100%;height:85vh;object-fit:cover;border-radius:0}

.video-info{position:absolute;left:25px;top:100px;background:rgba(0,0,0,.92);padding:22px 18px;border-radius:22px;max-width:220px;z-index:10;backdrop-filter:blur(15px);border:1px solid rgba(255,23,68,.3)}
.username{font-size:18px;font-weight:900;margin-bottom:8px}
.desc{font-size:14px;line-height:1.3;opacity:.95}

.actions{position:absolute;left:35px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:45px;z-index:15}
.action-btn{width:65px;height:65px;border-radius:50%;border:none;background:rgba(255,255,255,.18);backdrop-filter:blur(20px);color:#fff;font-size:26px;cursor:pointer;transition:all .3s ease;position:relative}
.action-btn:hover{transform:scale(1.18);background:rgba(255,23,68,.4);box-shadow:0 12px 35px rgba(255,23,68,.4)}
.action-btn.liked{background:linear-gradient(135deg,#ff1744,#ff5722)!important;animation:heartBeat .5s}
@keyframes heartBeat{0%,100%{transform:scale(1.18)}50%{transform:scale(1.35)}}

.count{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:700;min-width:50px;text-align:center}

.comments{position:absolute;right:25px;top:50%;transform:translateY(-50%);width:170px;max-height:380px;overflow-y:auto;background:rgba(0,0,0,.96);padding:22px;border-radius:22px;border:2px solid rgba(255,23,68,.4);display:none;backdrop-filter:blur(20px)}
.comment{display:flex;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #333;font-size:13px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(45deg,#ff1744,#ff5722);flex-shrink:0}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.98);display:flex;justify-content:space-around;padding:12px 0;z-index:100;backdrop-filter:blur(20px)}
.nav-item{text-align:center;cursor:pointer;padding:8px;flex:1;transition:all .3s}
.nav-item.active{color:#ff5722;transform:scale(1.08)}
.nav-icon{font-size:24px;margin-bottom:3px;display:block}

.upload-page{display:none;max-width:390px;margin:90px auto 0;padding-bottom:130px;text-align:center}
.upload-area{border:3px dashed #ff5722;padding:70px 40px;border-radius:25px;margin:40px 0;cursor:pointer;transition:all .3s;background:rgba(255,23,68,.03)}
.upload-area:hover{border-color:#ff1744;transform:scale(1.02)}
#preview{max-width:100%;max-height:280px;border-radius:20px;margin:25px 0;display:none}
input[type="text"]{width:100%;padding:18px;margin:18px 0;background:rgba(0,0,0,.8);color:#fff;border:2px solid #ff5722;border-radius:20px;font-size:16px;box-sizing:border-box}
.upload-btn{background:linear-gradient(45deg,#ff1744,#ff5722);color:#fff;border:none;padding:20px 45px;border-radius:28px;font-size:18px;font-weight:900;cursor:pointer;margin-top:25px;transition:all .3s}
.upload-btn:hover{transform:scale(1.05);box-shadow:0 10px 30px rgba(255,23,68,.5)}
.upload-btn:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<div class="header"><div class="logo">DKD</div></div>

<div id="feed" class="feed"></div>

<div id="upload-page" class="upload-page">
<h2 style="font-size:26px;margin-bottom:25px;font-weight:900">📱 नया वीडियो बनाओ</h2>
<div class="upload-area" onclick="document.getElementById('fileInput').click()">
<div style="font-size:20px;margin-bottom:8px">🎬 वीडियो चुनें</div>
<div style="font-size:14px;opacity:.8">या यहाँ drag करें</div>
</div>
<input type="file" id="fileInput" accept="video/*" style="display:none">
<video id="preview" controls preload="metadata"></video>
<input type="text" id="captionInput" placeholder="#DKD #पटना">
<button class="upload-btn" id="uploadButton" onclick="uploadVideo()" disabled>🚀 अपलोड!</button>
</div>

<div class="bottom-nav">
<div class="nav-item active" onclick="showPage('feed')">
<span class="nav-icon">🏠</span><span>होम</span>
</div>
<div class="nav-item" onclick="showPage('upload')">
<span class="nav-icon">+</span><span>अपलोड</span>
</div>
<div class="nav-item">
<span class="nav-icon">❤️</span><span>लाइक</span>
</div>
<div class="nav-item">
<span class="nav-icon">👤</span><span>मेरा</span>
</div>
</div>

<script>
// WORKING VIDEOS
const videoSources=['https://sample-videos.com/zip/10/mp4/SampleVideo_1280x720_1mb.mp4','https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4','https://sample-videos.com/zip/10/mp4/SampleVideo_1280x720_5mb.mp4','https://filesamples.com/samples/video/mp4/sample_640x360.mp4','https://www.learningcontainer.com/wp-content/uploads/2020/02/sample-video-file.mp4'];
let uploadedVideos=[];

function generateFeed(){
const feed=document.getElementById('feed');let html='';const allVideos=[...videoSources.map((src,i)=>({src,user:`dkd_user_${i}`,desc:`पटना का नया वीडियो #${i+1} 🔥`,likes:Math.floor(Math.random()*15000+5000)})),...uploadedVideos.slice(0,10)];allVideos.forEach((video,i)=>{
html+=`<div class="video-card">
<video src="${video.src}" muted loop playsinline preload="auto"></video>
<div class="video-info">
<div class="username">@${video.user}</div>
<div class="desc">${video.desc}</div>
</div>
<div class="actions">
<button class="action-btn ${i%3?'':'liked'}" onclick="toggleLike(this)"><span>❤️</span><div class="count">${(video.likes/1000).toFixed(1)}K</div></button>
<button class="action-btn" onclick="toggleComments(this)"><span>💬</span><div class="count">1.8K</div></button>
<button class="action-btn" onclick="shareVideo()"><span>↗️</span><div class="count">Share</div></button>
</div>
<div class="comments">
<div class="comment"><div class="avatar"></div><div>जबरदस्त भाई! 🔥</div></div>
<div class="comment"><div class="avatar" style="background:linear-gradient(45deg,#44ff44,#88ff88)"></div><div>पटना का बादशाह!</div></div>
</div>
</div>`});feed.innerHTML=html;setTimeout(()=>{const observer=new IntersectionObserver(entries=>{entries.forEach(entry=>{const video=entry.target.querySelector('video');if(entry.isIntersecting){video.play().catch(()=>{})}else{video.pause()}})},{threshold:.6});document.querySelectorAll('.video-card').forEach(card=>observer.observe(card))},800)}

function showPage(page){
document.getElementById('feed').style.display=page==='feed'?'block':'none';
document.getElementById('upload-page').style.display=page==='upload'?'block':'none';
document.querySelectorAll('.nav-item').forEach(item=>item.classList.remove('active'));
event.currentTarget.classList.add('active')
}

function toggleLike(btn){
btn.classList.toggle('liked');const count=btn.querySelector('.count');let num=parseFloat(count.textContent)*1000;num+=btn.classList.contains('liked')?1200:-1200;count.textContent=(num/1000).toFixed(1)+'K'}

function toggleComments(btn){
const card=btn.closest('.video-card'),comments=card.querySelector('.comments');comments.style.display=comments.style.display==='block'?'none':'block'}

function shareVideo(){
navigator.share({title:'DKD',url:window.location.href}).catch(()=>alert('लिंक कॉपी!'))
}

document.getElementById('fileInput').addEventListener('change',e=>{
const file=e.target.files[0];if(file&&file.type.startsWith('video/')){const preview=document.getElementById('preview');preview.src=URL.createObjectURL(file);preview.style.display='block';document.getElementById('uploadButton').disabled=false}
})

function uploadVideo(){
const file=document.getElementById('fileInput').files[0],caption=document.getElementById('captionInput').value;uploadedVideos.unshift({src:URL.createObjectURL(file),user:'dkd_official',desc:caption||'नया DKD वीडियो! 🔥',likes:0});generateFeed();document.getElementById('fileInput').value='';document.getElementById('captionInput').value='';document.getElementById('preview').style.display='none';document.getElementById('uploadButton').disabled=true;alert('✅ DKD ready!');showPage('feed')}

generateFeed()
</script>
</body>
</html>
