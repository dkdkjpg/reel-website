<!DOCTYPE html>
<html lang="bho">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>बुलु तिक - DKD</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#fff;font-family:Arial;overflow:hidden}
        .header{position:fixed;top:0;width:100%;background:rgba(0,0,0,.98);padding:10px 20px;z-index:1000;text-align:center}
        .logo{font-size:28px;font-weight:900;background:linear-gradient(45deg,#ff0000,#ff6666);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .feed{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;padding-top:70px;padding-bottom:100px;max-width:400px;margin:0 auto}
        .video-card{height:100vh;scroll-snap-align:start;position:relative;display:flex;align-items:center;justify-content:center}
        video{width:100%;height:80vh;object-fit:cover;border-radius:20px}
        .bulu-tik{position:absolute;top:20px;right:20px;font-size:48px;font-weight:900;color:#ff0000;text-shadow:0 0 30px #ff0000;animation:glow 2s infinite;z-index:100}
        @keyframes glow{0%,100%{text-shadow:0 0 20px #f00}50%{text-shadow:0 0 40px #f00,0 0 60px #f00}}
        .info{position:absolute;top:90px;left:20px;background:rgba(0,0,0,.9);padding:20px;border-radius:20px;max-width:220px}
        .username{font-size:18px;font-weight:900;color:#ff6666;margin-bottom:5px}
        .desc{font-size:14px}
        .actions{position:absolute;left:40px;bottom:50%;transform:translateY(50%);display:flex;flex-direction:column;gap:40px;z-index:50}
        .action-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:30px;width:70px;height:70px;border-radius:50%;cursor:pointer;backdrop-filter:blur(20px);transition:all .3s}
        .action-btn:hover{transform:scale(1.2);background:rgba(255,0,0,.4)}
        .action-btn.liked{background:#ff0000!important;animation:pulse .6s}
        @keyframes pulse{0%,100%{transform:scale(1.2)}50%{transform:scale(1.4)}}
        .count{position:absolute;bottom:-20px;font-size:12px;font-weight:bold;width:60px;text-align:center}
        .comments{position:absolute;right:20px;top:50%;transform:translateY(-50%);width:180px;max-height:350px;overflow:auto;background:rgba(0,0,0,.95);padding:20px;border-radius:20px;border:2px solid #ff0000;display:none}
        .comment{display:flex;gap:10px;margin-bottom:15px;font-size:13px}
        .bottom-nav{position:fixed;bottom:0;width:100%;background:rgba(0,0,0,.98);display:flex;justify-content:space-around;padding:10px;z-index:1000}
        .nav-item{text-align:center;cursor:pointer;padding:5px;flex:1}
        .nav-item.active{color:#ff6666}
        .upload{display:none;max-width:400px;margin:80px auto;padding-bottom:100px;text-align:center}
        .upload-area{border:3px dashed #ff6666;padding:80px 40px;border-radius:25px;cursor:pointer;margin:40px 0;transition:all .3s}
        .upload-area:hover{border-color:#ff0000;background:rgba(255,0,0,.05)}
        #preview{max-width:100%;max-height:250px;border-radius:20px;margin:20px 0;display:none}
        input{width:100%;padding:15px;margin:15px 0;background:#222;color:#fff;border:2px solid #ff6666;border-radius:15px;font-size:16px}
        .upload-btn{background:linear-gradient(45deg,#ff0000,#ff6666);color:#fff;border:none;padding:18px 40px;border-radius:25px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:20px}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">बुलु तिक</div>
    </div>
    
    <div id="feed" class="feed"></div>
    
    <div id="upload" class="upload">
        <h2>नया बुलु तिक बनाओ</h2>
        <div class="upload-area" onclick="document.getElementById('file').click()">📱 वीडियो चुनो</div>
        <input type="file" id="file" accept="video/*" style="display:none">
        <video id="preview" controls></video
