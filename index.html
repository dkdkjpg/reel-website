<!DOCTYPE html>
<html>
<head>
<title>Moj Clone Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}
.reel{
height:100vh;
position:relative;
scroll-snap-align:start;
}
video{
width:100%;
height:100%;
object-fit:cover;
}
.icons{
position:absolute;
right:10px;
bottom:120px;
text-align:center;
}
.icons div{
margin:20px 0;
cursor:pointer;
font-size:18px;
}
.topbar{
position:fixed;
top:10px;
left:10px;
z-index:1000;
}
button{
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}
.upload-box{
position:fixed;
top:50px;
left:10px;
background:#111;
padding:10px;
display:none;
}
</style>
</head>
<body>

<div class="topbar">
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="toggleUpload()">Upload</button>
</div>

<div class="upload-box" id="uploadBox">
<input type="file" id="videoFile"><br><br>
<input type="text" id="description" placeholder="Description"><br><br>
<button onclick="uploadVideo()">Submit</button>
</div>

<div id="feed"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

/* 🔥 PASTE YOUR FIREBASE CONFIG BELOW */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_MSG",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

window.login = async function(){
const provider = new GoogleAuthProvider();
await signInWithPopup(auth, provider);
alert("Login Success");
}

window.logout = async function(){
await signOut(auth);
alert("Logout Success");
}

window.toggleUpload = function(){
document.getElementById("uploadBox").style.display =
document.getElementById("uploadBox").style.display=="block"?"none":"block";
}

window.uploadVideo = async function(){
const file = document.getElementById("videoFile").files[0];
const desc = document.getElementById("description").value;
if(!file) return alert("Select video");

const storageRef = ref(storage, "videos/"+file.name);
await uploadBytes(storageRef, file);
const url = await getDownloadURL(storageRef);

await addDoc(collection(db,"videos"),{
url:url,
desc:desc,
likes:0
});

alert("Uploaded!");
location.reload();
}

async function loadVideos(){
const querySnapshot = await getDocs(collection(db,"videos"));
querySnapshot.forEach((docu)=>{
const data = docu.data();
const div = document.createElement("div");
div.className="reel";
div.innerHTML=`
<video src="${data.url}" autoplay muted loop playsinline></video>
<div class="icons">
<div onclick="likeVideo('${docu.id}',this)">❤️ ${data.likes}</div>
</div>
<div style="position:absolute;bottom:20px;left:10px;">
<p>${data.desc}</p>
</div>
`;
document.getElementById("feed").appendChild(div);
});
}
loadVideos();

window.likeVideo = async function(id,el){
let count = parseInt(el.innerText.split(" ")[1]);
count++;
el.innerText="❤️ "+count;
await updateDoc(doc(db,"videos",id),{likes:count});
}

</script>
</body>
</html>
