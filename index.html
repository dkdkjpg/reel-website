<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dkd - Short Video Sharing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #000;
            --text-color: #fff;
            --accent-color: #0095f6;
            --verified-color: #0095f6;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--primary-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            overflow: hidden;
        }

        /* --- Header --- */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .header-icons i {
            font-size: 20px;
            margin-left: 20px;
            cursor: pointer;
        }

        /* --- Reel Container --- */
        .reels-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }

        .reels-container::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome */

        .reel {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Overlay UI --- */
        .video-sidebar {
            position: absolute;
            right: 15px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .action-btn i { font-size: 28px; margin-bottom: 5px; }
        .action-btn span { font-size: 12px; }

        .liked { color: #ff3040; }

        .video-data {
            position: absolute;
            bottom: 30px;
            left: 15px;
            width: 70%;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .user-info b { font-size: 16px; }
        .verified-badge { color: var(--verified-color); font-size: 14px; }

        .follow-btn {
            border: 1px solid #fff;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- Settings & Upload Modal --- */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #262626;
            padding: 20px;
            border-radius: 12px;
            z-index: 1000;
            width: 80%;
            max-width: 400px;
        }

        .modal h3 { margin-top: 0; }
        .modal select, .modal input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #333;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .close-modal {
            float: right;
            cursor: pointer;
        }

        .overlay-bg {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">dkd</div>
        <div class="header-icons">
            <i class="fas fa-plus-square" onclick="toggleModal('uploadModal')"></i>
            <i class="fas fa-cog" onclick="toggleModal('settingsModal')"></i>
            <i class="fas fa-user-circle" onclick="loginPrompt()"></i>
        </div>
    </div>

    <div class="reels-container" id="reels-feed">
        </div>

    <div class="overlay-bg" id="overlay" onclick="closeAllModals()"></div>

    <div class="modal" id="settingsModal">
        <span class="close-modal" onclick="closeAllModals()">&times;</span>
        <h3>Settings</h3>
        <label>Select Language:</label>
        <select onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="hi">Hindi (हिन्दी)</option>
            <option value="bh">Bhojpuri (भोजपुरी)</option>
        </select>
    </div>

    <div class="modal" id="uploadModal">
        <span class="close-modal" onclick="closeAllModals()">&times;</span>
        <h3>Upload Video (1s - 10m)</h3>
        <input type="file" accept="video/*">
        <button style="width:100%; padding:10px; background:var(--accent-color); border:none; color:white; border-radius:5px;">Upload to dkd</button>
    </div>

    <script>
        // Language Dictionary
        const langData = {
            en: { follow: "Follow", share: "Share", comment: "Comment" },
            hi: { follow: "फॉलो करें", share: "शेयर", comment: "टिप्पणी" },
            bh: { follow: "फॉलो करीं", share: "भेजीं", comment: "बताईं" }
        };

        let currentLang = 'en';

        // Generate 200 Reels (Placeholder Logic)
        const container = document.getElementById('reels-feed');
        for (let i = 1; i <= 200; i++) {
            const reel = document.createElement('div');
            reel.className = 'reel';
            reel.innerHTML = `
                <video loop onclick="this.paused ? this.play() : this.pause()">
                    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                </video>
                <div class="video-sidebar">
                    <div class="action-btn" onclick="toggleLike(this)">
                        <i class="fas fa-heart"></i>
                        <span>${Math.floor(Math.random() * 5000)}</span>
                    </div>
                    <div class="action-btn">
                        <i class="fas fa-comment"></i>
                        <span class="lang-comment">Comment</span>
                    </div>
                    <div class="action-btn">
                        <i class="fas fa-share"></i>
                        <span class="lang-share">Share</span>
                    </div>
                </div>
                <div class="video-data">
                    <div class="user-info">
                        <b>dkd_official</b>
                        <i class="fas fa-check-circle verified-badge"></i>
                        <div class="follow-btn lang-follow">Follow</div>
                    </div>
                    <p>Bhojpuri Reel #${i} - Enjoy high quality content on dkd!</p>
                </div>
            `;
            container.appendChild(reel);
        }

        // Logic Functions
        function toggleLike(element) {
            const icon = element.querySelector('i');
            const span = element.querySelector('span');
            let count = parseInt(span.innerText);
            
            if (icon.classList.toggle('liked')) {
                span.innerText = count + 1;
            } else {
                span.innerText = count - 1;
            }
        }

        function toggleModal(id) {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById(id).style.display = 'block';
        }

        function closeAllModals() {
            document.getElementById('overlay').style.display = 'none';
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }

        function loginPrompt() {
            let user = prompt("Enter username to login to dkd:");
            if(user) alert("Welcome to dkd, " + user + "!");
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-follow').forEach(el => el.innerText = langData[lang].follow);
            document.querySelectorAll('.lang-share').forEach(el => el.innerText = langData[lang].share);
            document.querySelectorAll('.lang-comment').forEach(el => el.innerText = langData[lang].comment);
            closeAllModals();
        }

        // Auto-play video on scroll (Intersection Observer)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    video.play();
                } else {
                    video.pause();
                    video.currentTime = 0;
                }
            });
        }, { threshold: 0.8 });

        document.querySelectorAll('.reel').forEach(reel => observer.observe(reel));
    </script>
</body>
</html>
