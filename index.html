<!DOCTYPE html>
<html>
<head>
<title>My Reel Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  background: black;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.reel {
  height: 100vh;
  scroll-snap-align: start;
  position: relative;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>
<body>

<div class="reel">
  <video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay muted loop playsinline></video>
</div>

<div class="reel">
  <video src="https://www.w3schools.com/html/movie.mp4" autoplay muted loop playsinline></video>
</div>

</body>
</html>
