<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DKD - दक्ष्ह डांस | बुलु तिक</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }
        
        /* Header */
        .header { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            background: rgba(0,0,0,0.98); 
            padding: 10px 20px; 
            z-index: 1000;
        }
        .logo { 
            font-size: 28px; 
            font-weight: 900; 
            background: linear-gradient(45deg, #ff0000, #ff6666); 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            text-shadow: 0 0 20px rgba(255,0,0,0.5);
        }
        
        /* Language */
        .lang-select { 
            position: fixed; top: 70px; right: 20px; 
            background: rgba(0,0,0,0.8); color: #fff; 
            border: 1px solid #ff0000; padding: 8px 12px; 
            border-radius: 20px; z-index: 1001;
        }
        
        /* BULU TIK FEED - Moj Exact */
        .video-feed { 
            max-width: 420px; margin: 0 auto; 
            padding-top: 100px; padding-bottom: 120px;
            height: 100vh; overflow-y: scroll; 
            scroll-snap-type: y mandatory;
        }
        
        .video-card { 
            height: 100vh; scroll-snap-align: start; 
            position: relative; display: flex; 
            align-items: center; justify-content: center;
            padding: 30px 20px;
        }
        
        /* VIDEO WITH SOUND - FIXED */
        video { 
            width: 100%; max-height: 85vh; 
            object-fit: cover; border-radius: 20px;
            background: #111;
        }
        
        /* BULU TIK WATERMARK - बडे बडे */
        .bulu-tik { 
            position: absolute; top: 30px; right: 20px; 
            font-size: 36px; font-weight: 900; 
            color: rgba(255,0,0,0.9); 
            text-shadow: 0 0 20px rgba(255,0,0,1);
            z-index: 100; animation: glow 1.5s infinite;
            letter-spacing: 3px;
        }
        @keyframes glow { 
            0%,100% { text-shadow: 0 0 20px #f00, 0 0 30px #f00; }
            50% { text-shadow: 0 0 30px #f00, 0 0 50px #f00, 0 0 60px #f00; }
        }
        
        /* Video Info - Top Left */
        .video-info { 
            position: absolute; top: 120px; left: 25px; 
            background: rgba(0,0,0,0.9); padding: 20px; 
            border-radius: 20px; max-width: 250px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,0,0,0.5);
        }
        
        /* ACTION BUTTONS - CENTER SCREEN Moj Style */
        .action-buttons { 
            position: absolute; bottom: 200px; left: 50%; 
            transform: translateX(-50%); 
            display: flex; flex-direction: column; gap: 35px;
            z-index: 50;
        }
        .action-btn { 
            background: rgba(255,255,255,0.15); 
            border: none; color: #fff; 
            font-size: 32px; width: 80px; height: 80px; 
            border-radius: 50%; cursor: pointer; 
            backdrop-filter: blur(20px); border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
            display: flex; align-items: center; justify-content: center;
        }
        .action-btn:hover { 
            transform: scale(1.2); 
            background: rgba(255,0,0,0.3); 
            border-color: #ff0000;
            box-shadow: 0 15px 40px rgba(255,0,0,0.5);
        }
        .action-btn.liked { 
            background: linear-gradient(45deg, #ff0000, #ff6666) !important;
            animation: heartPulse 0.6s infinite;
        }
        @keyframes heartPulse { 
            0%,100% { transform: scale(1.2); }
            50% { transform: scale(1.4); }
        }
        .action-count { 
            position: absolute; bottom: -25px; 
            font-size: 14px; font-weight: bold; 
            min-width: 40px; text-align: center;
        }
        
        /* Comments - Right Side */
        .comments-panel { 
            position: absolute; right: 25px; top: 50%; 
            transform: translateY(-50%); 
            width: 200px; max-height: 400px; 
            overflow-y: auto; background: rgba(0,0,0,0.95);
            padding: 25px; border-radius: 25px;
            border: 2px solid rgba(255,0,0,0.5); display: none;
            backdrop-filter: blur(25px);
        }
        
        /* Bottom Nav */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(0,0,0,0.98); display: flex; 
            justify-content: space-around; padding: 15px 0;
            z-index: 1000; backdrop-filter: blur(20px);
        }
        .nav-item { text-align: center; cursor: pointer; padding: 10px; flex: 1; }
        .nav-item.active { color: #ff6666; }
        
        /* Upload */
        .upload-page { 
            max-width: 450px; margin: 100px auto 150px; 
            text-align: center; display: none;
        }
        .upload-area { 
            border: 4px dashed #ff6666; padding: 100px 50px; 
            border-radius: 30px; cursor: pointer; margin: 50px 0;
            transition: all 0.4s; position: relative;
        }
        .upload-area:hover { border-color: #ff0000; background: rgba(255,0,0,0.05); }
        #video-preview { max-width: 100%; max-height: 300px; border-radius: 20px; margin: 30px 0; display: none; }
        input { width: 100%; padding: 20px; margin: 20px 0; background: #222; color: #fff; border: 2px solid #ff6666; border-radius: 20px; font-size: 16px; }
        .upload-btn { background: linear-gradient(45deg, #ff0000, #ff6666); color: #fff; border: none; padding: 20px 50px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; }
    </style>
</head>
